services:
  db:
    image: postgres:16
    container_name: api_tracking_whatsapp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tracking_whatsapp
      POSTGRES_USER: tracking_user
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - tracking_whatsapp_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracking_user -d tracking_whatsapp"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: api_tracking_whatsapp_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
    ports:
      - "127.0.0.1:8000:8000"

volumes:
  tracking_whatsapp_postgres:
